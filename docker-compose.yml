services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/backend
      - CUSTOMEROPS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8080,https://customer-ops-agent.vercel.app
      - CUSTOMEROPS_LLM_TIMEOUT_SECONDS=30

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
